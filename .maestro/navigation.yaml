appId: com.u1.slicer.orca
---
# E2E: verify all 5 tabs navigate without crash.
# Mirrors bridge tests/smoke.spec.ts tab navigation checks.

- launchApp:
    clearState: true

- assertVisible: "Prepare"

- tapOn: "Printer"
- assertVisible: "Printer"

- tapOn: "Preview"
- assertVisible: "Preview"

- tapOn: "Jobs"
- assertVisible: "Jobs"

- tapOn: "Settings"
- assertVisible: "Settings"
- assertVisible: "Snapmaker U1"

- tapOn: "Prepare"
- assertVisible: "U1 Slicer"
