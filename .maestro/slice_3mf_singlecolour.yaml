appId: com.u1.slicer.orca
---
# E2E: load a single-colour Bambu 3MF (u1-auxiliary-fan-cover-hex_mw.3mf),
# slice it, verify result.
# Mirrors bridge tests/slicing.spec.ts "single-color Bambu file slices via browser UI"
#
# Prerequisites:
#   adb push u1-auxiliary-fan-cover-hex_mw.3mf //sdcard/Download/
#   Get content URI ID and launch as VIEW intent (see slice_stl.yaml)

# Model editor should show once the 3MF is loaded.
- assertVisible: "Slice Model"
- assertVisible: "Scale & Copies"

# Scroll to slice
- scrollUntilVisible:
    element:
      text: "Slice Model"
    direction: DOWN
    timeout: 5000

- tapOn: "Slice Model"

# Wait for the finished preview/result state.
- extendedWaitUntil:
    visible: "Slice Summary"
    timeout: 180000

# Result shown
- assertVisible: "layers"
- assertVisible: "Print"
- assertNotVisible: "Error"
